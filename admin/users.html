{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>👤 Quản lý người dùng</h2>

<table class="table table-bordered">

<tr class="table-dark">

<th>ID</th>
<th>Họ tên</th>
<th>Email</th>
<th>Điện thoại</th>
<th>Quyền</th>
<th></th>

</tr>

{% for u in users %}

<tr>

<td>{{ u.id }}</td>

<td>{{ u.fullname }}</td>

<td>{{ u.email }}</td>

<td>{{ u.phone }}</td>

<td>{{ u.role }}</td>

<td>

<a
href="/admin/users/set-admin/{{ u.id }}"
class="btn btn-success btn-sm">
Admin
</a>

<a
href="/admin/users/set-user/{{ u.id }}"
class="btn btn-warning btn-sm">
User
</a>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
