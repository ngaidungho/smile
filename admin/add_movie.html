{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>➕ Thêm phim</h2>

<form method="POST">

<div class="mb-3">
<label>Tên phim</label>
<input
type="text"
class="form-control"
name="title"
required>
</div>

<div class="mb-3">
<label>Thể loại</label>
<input
type="text"
class="form-control"
name="genre"
required>
</div>

<div class="mb-3">
<label>Thời lượng</label>
<input
type="number"
class="form-control"
name="duration"
required>
</div>

<div class="mb-3">
<label>Ngày khởi chiếu</label>
<input
type="date"
class="form-control"
name="release_date">
</div>

<div class="mb-3">
<label>Mô tả</label>
<textarea
class="form-control"
rows="5"
name="description"></textarea>
</div>

<div class="mb-3">
<label>Link Poster</label>
<input
type="text"
class="form-control"
name="poster"
placeholder="https://....jpg">
</div>

<button class="btn btn-success">
➕ Thêm phim
</button>

<a href="/admin/movies"
class="btn btn-secondary">
Quay lại
</a>

</form>

</div>

{% endblock %}
